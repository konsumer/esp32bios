; One app, many hosts. Pick an environment with `-e`.
;
;   pio run -e native -t exec        # run on your desktop (ASCII display)
;   pio run -e esp32-serial -t upload -t monitor
;   pio run -e esp32-ssd1306 -t upload
;   pio run -e m5stack -t upload
;
; Every env compiles the SAME src/app.cpp. Each host_*.cpp is guarded by a
; -D flag so only the selected host is built in.

[platformio]
default_envs = native

[env]
build_flags = -Iinclude -Wall

; ---- Desktop: no hardware required -------------------------------------------
[env:native]
platform = native
build_flags = ${env.build_flags} -DBIOS_HOST_NATIVE

; ---- Any ESP32, no libraries: renders over the serial monitor ----------------
[env:esp32-serial]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = ${env.build_flags} -DBIOS_HOST_SERIAL

; ---- ESP32 + 128x64 I2C OLED -------------------------------------------------
[env:esp32-ssd1306]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
build_flags = ${env.build_flags} -DBIOS_HOST_SSD1306

; ---- ESP32 runtime ELF loader: loads data/app.elf from LittleFS, no reflash --
[env:esp32-elf]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_flags = ${env.build_flags} -DBIOS_HOST_ELF

; ---- M5Stack family (Core/Core2/Fire/StickC...) ------------------------------
[env:m5stack]
platform = espressif32
board = m5stack-core-esp32
framework = arduino
monitor_speed = 115200
lib_deps = m5stack/M5Unified@^0.1.16
build_flags = ${env.build_flags} -DBIOS_HOST_M5

; ---- M5Stack Cardputer (ESP32-S3 / StampS3) ----------------------------------
[env:cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
lib_deps = m5stack/M5Unified@^0.1.16
build_flags = ${env.build_flags} -DBIOS_HOST_M5
